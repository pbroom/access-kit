name: Container Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the rebac-api image to GHCR when true.
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "rebac-api-v*"

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rebac-api
  SHOULD_PUBLISH: ${{ github.event_name == 'push' || inputs.publish == true }}

jobs:
  release-api-image:
    name: Build, attest, sign, and publish rebac-api
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: env.SHOULD_PUBLISH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=access-kit-rebac-api
            org.opencontainers.image.description=Access Kit ReBAC API runtime
            org.opencontainers.image.vendor=Access Kit
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build image with SBOM and provenance metadata
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: runtime
          push: ${{ env.SHOULD_PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        if: env.SHOULD_PUBLISH == 'true'
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Attest build provenance
        if: env.SHOULD_PUBLISH == 'true'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign published image
        if: env.SHOULD_PUBLISH == 'true'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Publish release summary
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          image_ref="$IMAGE_REPOSITORY"
          if [ -n "$IMAGE_DIGEST" ]; then
            image_ref="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          fi

          {
            echo "## rebac-api image"
            echo
            echo "- Published: ${{ env.SHOULD_PUBLISH }}"
            echo "- Image: $image_ref"
            echo "- Provenance: buildx metadata plus GitHub artifact attestation when published"
            echo "- Signature: keyless cosign signature when published"
          } >> "$GITHUB_STEP_SUMMARY"
