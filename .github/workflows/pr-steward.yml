name: PR Steward

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  steward-status:
    name: Steward status
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inspect open pull requests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          pnpm steward:check | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Show next backlog batch
        run: |
          set -o pipefail
          pnpm backlog:batch | tee -a "$GITHUB_STEP_SUMMARY"
