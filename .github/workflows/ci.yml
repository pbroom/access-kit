name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-validation:
    name: Contract validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate public contracts
        run: pnpm validate:contracts

      - name: Validate CI workflow contract
        run: pnpm validate:ci

      - name: Validate container packaging contract
        run: pnpm validate:packaging

  quality:
    name: Quality (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.x
          - 24.x
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  evidence:
    name: Evidence report
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check proof-point evidence freshness
        run: pnpm evidence:check

  container-packaging:
    name: Container packaging
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build rebac-api image
        run: docker build --target runtime --tag access-kit-rebac-api:${{ github.sha }} .

      - name: Smoke test rebac-api image
        run: |
          docker run --rm --detach \
            --name rebac-api-smoke \
            --publish 3000:3000 \
            --env REBAC_API_KEYS=ci-smoke \
            access-kit-rebac-api:${{ github.sha }}

          cleanup() {
            docker logs rebac-api-smoke || true
            docker stop rebac-api-smoke || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/v1/health >/tmp/rebac-health.json; then
              break
            fi
            sleep 0.5
          done

          health_status=$(curl --silent --show-error --output /tmp/rebac-health.json --write-out "%{http_code}" http://127.0.0.1:3000/v1/health)
          ready_status=$(curl --silent --show-error --output /tmp/rebac-ready.json --write-out "%{http_code}" http://127.0.0.1:3000/v1/ready)
          unauth_status=$(curl --silent --show-error --output /tmp/rebac-unauthenticated.json --write-out "%{http_code}" http://127.0.0.1:3000/v1/subjects)
          auth_status=$(curl --silent --show-error --oauth2-bearer ci-smoke --output /tmp/rebac-authenticated.json --write-out "%{http_code}" http://127.0.0.1:3000/v1/subjects)

          test "$health_status" = "200"
          test "$ready_status" = "200"
          test "$unauth_status" = "401"
          test "$auth_status" = "200"
