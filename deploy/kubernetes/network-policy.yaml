apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rebac-api-restricted
  namespace: access-kit
  labels:
    app.kubernetes.io/name: rebac-api
    app.kubernetes.io/part-of: access-kit
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rebac-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              access-kit.io/rebac-api-client-namespace: "true"
        - podSelector:
            matchLabels:
              access-kit.io/rebac-api-client: "true"
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
